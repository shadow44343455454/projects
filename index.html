<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator - Basic & Scientific</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow-x: hidden;
        }

        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 10px;
        }

        /* Loading Screen */
        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 48px;
            color: white;
            z-index: 9999;
            transition: opacity 0.5s ease-out;
        }

        #loading.hide {
            opacity: 0;
            pointer-events: none;
        }

        /* Main Container */
        .wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            width: 100%;
            max-width: 500px;
        }

        /* Toggle Button */
        .mode-toggle {
            padding: 12px 30px;
            font-size: 16px;
            border: none;
            background: white;
            color: #667eea;
            cursor: pointer;
            border-radius: 25px;
            font-weight: bold;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            width: 90%;
            max-width: 350px;
        }

        .mode-toggle:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .mode-toggle:active {
            transform: translateY(0);
        }

        /* Calculator Flip Container */
        .calculator-container {
            position: relative;
            width: 90vw;
            max-width: 400px;
             height: 600px; 
            perspective: 1000px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        /* Individual Views */
        .calculator-view {
            position: absolute;
            width: 100%;
            height: 100%;
            padding: 15px;
            backface-visibility: hidden;
            transition: transform 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* BASIC VIEW */
        .basic-view {
            transform: rotateY(0deg);
        }

        /* SCIENTIFIC VIEW */
        .scientific-view {
            transform: rotateY(180deg);
        }

        /* When flipped */
        .flipped .basic-view {
            transform: rotateY(180deg);
        }

        .flipped .scientific-view {
            transform: rotateY(0deg);
        }

        /* Display Section */
        .display-container {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 10px;
            min-height: 70px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            gap: 5px;
            flex-shrink: 0;
        }

        .previous-operand {
            color: #888;
            font-size: 14px;
            text-align: right;
            min-height: 18px;
            word-wrap: break-word;
            word-break: break-all;
        }

        .current-operand {
            color: #00ff00;
            font-size: 24px;
            text-align: right;
            min-height: 30px;
            word-wrap: break-word;
            word-break: break-all;
        }

        /* Buttons Grid */
        .buttons {
            display: grid;
            gap: 8px;
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
        }

        /* Basic Calculator Grid */
        .basic-view .buttons {
            grid-template-columns: repeat(4, 1fr);
        }

        /* Scientific Calculator Grid */
        .scientific-view .buttons {
            grid-template-columns: repeat(5, 1fr);
        }

        /* Button Styling */
        button.calc-btn {
            padding: 12px 8px;
            font-size: 14px;
            border: none;
            background: #e0e0e0;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s;
            font-weight: bold;
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            word-break: break-word;
        }

        button.calc-btn:hover {
            background: #d0d0d0;
        
        }

        button.calc-btn:active {
            transform: scale(0.95);
        }

        /* Operator Buttons */
        button.operator {
            background: #ff9500;
            color: white;
        }

        button.operator:hover {
            background: #ff8500;
        }

        /* Equals Button */
        button.equals {
            background: #4CAF50;
            color: white;
            grid-column: span 2;
        }

        button.equals:hover {
            background: #45a049;
        }

        /* Clear Button */
        button.clear {
            background: #f44336;
            color: white;
            grid-column: span 2;
        }

        button.clear:hover {
            background: #da190b;
        }

        /* Delete Button */
        button.delete {
            background: #ff5722;
            color: white;
        }

        button.delete:hover {
            background: #e64a19;
        }

        /* Scientific Buttons */
        button.scientific {
            background: #2196F3;
            color: white;
            font-size: 12px;
        }

        button.scientific:hover {
            background: #0b7dda;
        }

        /* Mode Label */
        .mode-label {
            color: white;
            font-size: 16px;
            font-weight: bold;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* ============ TABLET & SMALL DESKTOP (768px) ============ */
        @media (max-width: 768px) {
            body {
                padding: 5px;
            }

            .wrapper {
                gap: 12px;
            }

            .calculator-container {
                width: 95vw;
                height: 550px;
            }

            .mode-toggle {
                font-size: 14px;
                padding: 10px 25px;
                max-width: 90%;
            }

            .display-container {
                min-height: 65px;
                padding: 12px;
            }

            .previous-operand {
                font-size: 13px;
            }

            .current-operand {
                font-size: 22px;
            }

            button.calc-btn {
                padding: 10px 6px;
                font-size: 13px;
                min-height: 42px;
            }

            .buttons {
                gap: 6px;
            }

            .calculator-view {
                padding: 12px;
                gap: 8px;
            }
        }

        /* ============ MOBILE PHONES (480px and below) ============ */
        @media (max-width: 480px) {
            body {
                padding: 0;
                min-height: 100vh;
            }

            .wrapper {
                gap: 8px;
                width: 100%;
                padding: 5px;
            }

            .mode-label {
                font-size: 14px;
                letter-spacing: 0.5px;
            }

            .mode-toggle {
                font-size: 13px;
                padding: 9px 20px;
                width: 95%;
                border-radius: 20px;
            }

            .calculator-container {
                width: 100vw;
                max-width: none;
                /* height: auto; */
                aspect-ratio: 9 / 11;
               /* max-height: 85vh;*/
                border-radius: 15px;
            }

            .calculator-view {
                padding: 10px;
                gap: 7px;
            }

            .display-container {
                min-height: 60px;
                padding: 10px;
                border-radius: 8px;
            }

            .previous-operand {
                font-size: 12px;
            }

            .current-operand {
                font-size: 20px;
            }

            /* Basic Grid */
            .basic-view .buttons {
                grid-template-columns: repeat(4, 1fr);
            }

            /* Scientific Grid - Reduce columns for mobile */
            .scientific-view .buttons {
                grid-template-columns: repeat(4, 1fr);
            }

            button.calc-btn {
                padding: 8px 4px;
                font-size: 12px;
                min-height: 40px;
                border-radius: 6px;
            }

            .buttons {
                gap: 5px;
            }

            /* Adjust span for mobile */
            .basic-view .buttons .clear,
            .basic-view .buttons .equals {
                grid-column: span 2;
            }

            .scientific-view .buttons .clear,
            .scientific-view .buttons .delete {
                grid-column: span 1;
            }

            .scientific-view .buttons .equals {
                grid-column: span 2;
            }

            button.scientific {
                font-size: 11px;
            }

            .mode-toggle:active {
                transform: scale(0.98);
            }
        }

        /* ============ VERY SMALL PHONES (max-width: 380px) ============ */
        @media (max-width: 380px) {
            .calculator-container {
                aspect-ratio: 9 / 12;
                max-height: 90vh;
            }

            .mode-label {
                font-size: 12px;
            }

            .mode-toggle {
                font-size: 12px;
                padding: 8px 18px;
            }

            .display-container {
                min-height: 55px;
                padding: 8px;
            }

            .previous-operand {
                font-size: 11px;
            }

            .current-operand {
                font-size: 18px;
            }

            button.calc-btn {
                padding: 6px 3px;
                font-size: 11px;
                min-height: 38px;
            }

            .buttons {
                gap: 4px;
            }

            .calculator-view {
                padding: 8px;
                gap: 6px;
            }
        }

        /* ============ LANDSCAPE MODE (height < 600px) ============ */
        @media (max-height: 600px) {
            .calculator-container {
                height: 90vh;
                max-height: 90vh;
            }

            .display-container {
                min-height: 50px;
                padding: 8px;
            }

            .current-operand {
                font-size: 18px;
            }

            .previous-operand {
                font-size: 11px;
            }

            button.calc-btn {
                min-height: 36px;
                padding: 6px 4px;
            }

            .calculator-view {
                padding: 8px;
                gap: 5px;
            }

            .buttons {
                gap: 4px;
            }
        }

        /* ============ LANDSCAPE MODE - Mobile ============ */
        @media (max-width: 768px) and (max-height: 500px) {
            .calculator-container {
                height: 95vh;
            }

            button.calc-btn {
                min-height: 32px;
                font-size: 10px;
                padding: 4px 2px;
            }

            .current-operand {
                font-size: 16px;
            }

            .previous-operand {
                font-size: 10px;
            }

            .mode-toggle {
                font-size: 11px;
                padding: 6px 15px;
            }

            button.scientific {
                font-size: 9px;
            }
        }

        /* ============ SCROLLBAR STYLING ============ */
        .buttons::-webkit-scrollbar {
            width: 4px;
        }

        .buttons::-webkit-scrollbar-track {
            background: transparent;
        }

        .buttons::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 2px;
        }

        .buttons::-webkit-scrollbar-thumb:hover {
            background: #999;
        }

        /* ============ TOUCH-FRIENDLY ADJUSTMENTS ============ */
        @media (hover: none) and (pointer: coarse) {
            button.calc-btn {
                min-height: 48px;
            }

            button.calc-btn:active {
                opacity: 0.8;
            }

            button.calc-btn:hover {
                transform: none;
            }
        }
    </style>
</head>
<body>

    <!-- Loading Screen -->
    <div id="loading">
        <div>Loading...</div>
    </div>

    <!-- Main Wrapper -->
    <div class="wrapper">
        <div class="mode-label" id="modeLabel">BASIC CALCULATOR</div>
        
        <!-- Toggle Button -->
        <button class="mode-toggle" onclick="toggleScientific()" id="toggleBtn">Scientific Mode</button>

        <!-- Calculator Container (Flips) -->
        <div class="calculator-container" id="calculatorContainer">
            
            <!-- ============ BASIC VIEW ============ -->
            <div class="calculator-view basic-view">
                <div class="display-container">
                    <div class="previous-operand" id="basicPreviousOperand"></div>
                    <div class="current-operand" id="basicCurrentOperand">0</div>
                </div>
                <div class="buttons">
                    <button class="calc-btn clear" onclick="clearDisplay()">C</button>
                    <button class="calc-btn operator" onclick="chooseOperation('/')">÷</button>
                    <button class="calc-btn operator" onclick="chooseOperation('*')">×</button>
                    <button class="calc-btn delete" onclick="deleteNumber()">DEL</button>

                    <button class="calc-btn" onclick="appendNumber('7')">7</button>
                    <button class="calc-btn" onclick="appendNumber('8')">8</button>
                    <button class="calc-btn" onclick="appendNumber('9')">9</button>
                    <button class="calc-btn operator" onclick="chooseOperation('-')">−</button>

                    <button class="calc-btn" onclick="appendNumber('4')">4</button>
                    <button class="calc-btn" onclick="appendNumber('5')">5</button>
                    <button class="calc-btn" onclick="appendNumber('6')">6</button>
                    <button class="calc-btn operator" onclick="chooseOperation('+')">+</button>

                    <button class="calc-btn" onclick="appendNumber('1')">1</button>
                    <button class="calc-btn" onclick="appendNumber('2')">2</button>
                    <button class="calc-btn" onclick="appendNumber('3')">3</button>
                    <button class="calc-btn" onclick="appendDecimal()">.</button>

                    <button class="calc-btn" onclick="appendNumber('0')" style="grid-column: span 2;">0</button>
                    <button class="calc-btn equals" onclick="compute()">=</button>
                </div>
            </div>

            <!-- ============ SCIENTIFIC VIEW ============ -->
            <div class="calculator-view scientific-view">
                <div class="display-container">
                    <div class="previous-operand" id="scientificPreviousOperand"></div>
                    <div class="current-operand" id="scientificCurrentOperand">0</div>
                </div>
                <div class="buttons">
                    <!-- Row 1 -->
                    <button class="calc-btn clear" onclick="clearDisplay()">C</button>
                    <button class="calc-btn delete" onclick="deleteNumber()">DEL</button>
                    <button class="calc-btn scientific" onclick="toggleDegRad()" id="degRadBtn">DEG</button>
                    <button class="calc-btn operator" onclick="chooseOperation('/')">÷</button>

                    <!-- Row 2 -->
                    <button class="calc-btn scientific" onclick="appendConstant('π')">π</button>
                    <button class="calc-btn scientific" onclick="appendConstant('e')">e</button>
                    <button class="calc-btn scientific" onclick="appendTrig('sin')">sin</button>
                    <button class="calc-btn scientific" onclick="appendTrig('cos')">cos</button>

                    <!-- Row 3 -->
                    <button class="calc-btn scientific" onclick="appendTrig('tan')">tan</button>
                    <button class="calc-btn scientific" onclick="appendLog('log')">log</button>
                    <button class="calc-btn scientific" onclick="appendLog('ln')">ln</button>
                    <button class="calc-btn scientific" onclick="appendSquare()">x²</button>

                    <!-- Row 4 -->
                    <button class="calc-btn scientific" onclick="appendSquareRoot()">√</button>
                    <button class="calc-btn scientific" onclick="appendPower()">x^y</button>
                    <button class="calc-btn scientific" onclick="appendFactorial()">n!</button>
                    <button class="calc-btn scientific" onclick="appendReciprocal()">1/x</button>

                    <!-- Row 5 -->
                    <button class="calc-btn operator" onclick="chooseOperation('*')">×</button>
                    <button class="calc-btn" onclick="appendNumber('7')">7</button>
                    <button class="calc-btn" onclick="appendNumber('8')">8</button>
                    <button class="calc-btn" onclick="appendNumber('9')">9</button>

                    <!-- Row 6 -->
                    <button class="calc-btn operator" onclick="chooseOperation('-')">−</button>
                    <button class="calc-btn" onclick="appendNumber('4')">4</button>
                    <button class="calc-btn" onclick="appendNumber('5')">5</button>
                    <button class="calc-btn" onclick="appendNumber('6')">6</button>

                    <!-- Row 7 -->
                    <button class="calc-btn scientific" onclick="appendModulo()">mod</button>
                    <button class="calc-btn" onclick="appendNumber('1')">1</button>
                    <button class="calc-btn" onclick="appendNumber('2')">2</button>
                    <button class="calc-btn" onclick="appendNumber('3')">3</button>

                    <!-- Row 8 -->
                    <button class="calc-btn operator" onclick="chooseOperation('+')">+</button>
                    <button class="calc-btn" onclick="appendNumber('0')" style="grid-column: span 1;">0</button>
                    <button class="calc-btn" onclick="appendDecimal()">.</button>
                    

                    <!-- Row 9 -->
                    <button class="calc-btn equals" onclick="compute()" style="grid-column: span 4;">=</button>
                </div>
            </div>

        </div>
    </div>

    <script>
        // ============ TOGGLE FUNCTIONALITY ============
        let isScientific = false;

        function toggleScientific() {
            const container = document.getElementById('calculatorContainer');
            const button = document.getElementById('toggleBtn');
            const modeLabel = document.getElementById('modeLabel');

            isScientific = !isScientific;

            if (isScientific) {
                container.classList.add('flipped');
                button.textContent = 'Basic Mode';
                modeLabel.textContent = 'SCIENTIFIC CALCULATOR';
            } else {
                container.classList.remove('flipped');
                button.textContent = 'Scientific Mode';
                modeLabel.textContent = 'BASIC CALCULATOR';
            }
        }

        // ============ CALCULATOR LOGIC ============
        class Calculator {
            constructor() {
                this.basicPrevOperand = document.getElementById('basicPreviousOperand');
                this.basicCurrOperand = document.getElementById('basicCurrentOperand');
                this.scientificPrevOperand = document.getElementById('scientificPreviousOperand');
                this.scientificCurrOperand = document.getElementById('scientificCurrentOperand');
                this.isDegrees = true;
                this.clear();
            }

            clear() {
                this.currentOperand = '';
                this.previousOperand = '';
                this.operation = undefined;
                this.updateDisplay();
            }

            deleteNumber() {
                this.currentOperand = this.currentOperand.toString().slice(0, -1);
                this.updateDisplay();
            }

            appendNumber(number) {
                if (number === '.' && this.currentOperand.includes('.')) return;
                this.currentOperand = this.currentOperand.toString() + number.toString();
                this.updateDisplay();
            }

            appendConstant(constant) {
                if (constant === 'π') {
                    this.currentOperand = Math.PI;
                } else if (constant === 'e') {
                    this.currentOperand = Math.E;
                }
                this.updateDisplay();
            }
            appendmodulo() {
                if (this.currentOperand === '') return;
                this.previousOperand = this.currentOperand + ' mod';
                this.operation = '%';
                this.currentOperand = '';
                this.updateDisplay();
            }

            appendTrig(func) {
                if (this.currentOperand === '') return;
                
                let angle = parseFloat(this.currentOperand);
                if (this.isDegrees) {
                    angle = angle * (Math.PI / 180);
                }

                let result;
                switch(func) {
                    case 'sin':
                        result = Math.sin(angle);
                        this.previousOperand = `sin(${this.currentOperand})`;
                        break;
                    case 'cos':
                        result = Math.cos(angle);
                        this.previousOperand = `cos(${this.currentOperand})`;
                        break;
                    case 'tan':
                        result = Math.tan(angle);
                        this.previousOperand = `tan(${this.currentOperand})`;
                        break;
                }
                this.currentOperand = result.toFixed(6);
                this.operation = undefined;
                this.updateDisplay();
            }

            appendLog(func) {
                if (this.currentOperand === '') return;
                
                let num = parseFloat(this.currentOperand);
                let result;
                
                if (func === 'log') {
                    result = Math.log10(num);
                    this.previousOperand = `log(${this.currentOperand})`;
                } else {
                    result = Math.log(num);
                    this.previousOperand = `ln(${this.currentOperand})`;
                }
                
                this.currentOperand = result.toFixed(6);
                this.operation = undefined;
                this.updateDisplay();
            }

            appendSquare() {
                if (this.currentOperand === '') return;
                let num = parseFloat(this.currentOperand);
                this.currentOperand = (num * num).toFixed(6);
                this.previousOperand = `(${num})²`;
                this.operation = undefined;
                this.updateDisplay();
            }

            appendSquareRoot() {
                if (this.currentOperand === '') return;
                let num = parseFloat(this.currentOperand);
                this.currentOperand = Math.sqrt(num).toFixed(6);
                this.previousOperand = `√(${num})`;
                this.operation = undefined;
                this.updateDisplay();
            }

            appendPower() {
                if (this.currentOperand === '') return;
                this.previousOperand = this.currentOperand + '^';
                this.operation = '^';
                this.currentOperand = '';
                this.updateDisplay();
            }

            appendFactorial() {
                if (this.currentOperand === '') return;
                let num = parseInt(this.currentOperand);
                let result = 1;
                for (let i = 2; i <= num; i++) {
                    result *= i;
                }
                this.currentOperand = result;
                this.previousOperand = `${num}!`;
                this.operation = undefined;
                this.updateDisplay();
            }

            appendReciprocal() {
                if (this.currentOperand === '') return;
                let num = parseFloat(this.currentOperand);
                this.currentOperand = (1 / num).toFixed(6);
                this.previousOperand = `1/(${num})`;
                this.operation = undefined;
                this.updateDisplay();
            }

            appendModulo() {
                if (this.currentOperand === '') return;
                this.previousOperand = this.currentOperand + ' mod';
                this.operation = '%';
                this.currentOperand = '';
                this.updateDisplay();
            }

            chooseOperation(operation) {
                if (this.currentOperand === '') return;
                if (this.previousOperand !== '') {
                    this.compute();
                }
                this.operation = operation;
                this.previousOperand = this.currentOperand + ' ' + operation;
                this.currentOperand = '';
                this.updateDisplay();
            }

            compute() {
                let computation;
                const prev = parseFloat(this.previousOperand);
                const current = parseFloat(this.currentOperand);
                
                if (isNaN(prev) || isNaN(current)) return;

                switch (this.operation) {
                    case '+':
                        computation = prev + current;
                        break;
                    case '-':
                        computation = prev - current;
                        break;
                    case '*':
                        computation = prev * current;
                        break;
                    case '%':
                        computation =prev % current;
                        break;
                    case '/':
                        computation = prev / current;
                        break;
                    case '^':
                        computation = Math.pow(prev, current);
                        break;
                    case '%':
                        computation = prev % current;
                        break;
                    default:
                        return;
                }
                this.currentOperand = computation.toFixed(6);
                this.operation = undefined;
                this.previousOperand = '';
                this.updateDisplay();
            }

            toggleDegRad() {
                this.isDegrees = !this.isDegrees;
                document.getElementById('degRadBtn').textContent = this.isDegrees ? 'DEG' : 'RAD';
            }

            updateDisplay() {
                this.basicCurrOperand.textContent = this.currentOperand || '0';
                this.basicPrevOperand.textContent = this.previousOperand;
                this.scientificCurrOperand.textContent = this.currentOperand || '0';
                this.scientificPrevOperand.textContent = this.previousOperand;
            }
        }

        const calculator = new Calculator();

        // ============ FUNCTION WRAPPERS ============
        function appendNumber(number) {
            calculator.appendNumber(number);
        }

        function appendDecimal() {
            calculator.appendNumber('.');
        }

        function chooseOperation(operation) {
            calculator.chooseOperation(operation);
        }

        function compute() {
            calculator.compute();
        }

        function clearDisplay() {
            calculator.clear();
        }

        function deleteNumber() {
            calculator.deleteNumber();
        }

        function appendConstant(constant) {
            calculator.appendConstant(constant);
        }

        function appendTrig(func) {
            calculator.appendTrig(func);
        }

        function appendLog(func) {
            calculator.appendLog(func);
        }

        function appendSquare() {
            calculator.appendSquare();
        }

        function appendSquareRoot() {
            calculator.appendSquareRoot();
        }

        function appendPower() {
            calculator.appendPower();
        }

        function appendFactorial() {
            calculator.appendFactorial();
        }

        function appendReciprocal() {
            calculator.appendReciprocal();
        }

        function appendModulo() {
            calculator.appendModulo();
        }

        function toggleDegRad() {
            calculator.toggleDegRad();
        }

        // ============ LOADING SCREEN ============
        window.addEventListener('load', function() {
            setTimeout(function() {
                document.getElementById('loading').classList.add('hide');
            }, 2000);
        });

        // ============ PREVENT ZOOM ON DOUBLE TAP ============
        document.addEventListener('touchmove', function(event) {
            if (event.scale !== 1) {
                event.preventDefault();
            }
        }, { passive: false });
    </script>

</body>
</html>
